<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edlevo-ComicBook</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Loading overlay: stays until comic images finish downloading -->
  <div id="bookLoader" class="book-loader" role="status" aria-live="polite" aria-label="Loading comic">
    <div class="loader">
      <div class="loader-book">
        <div class="loader-page"></div>
        <div class="loader-page loader-page2"></div>
      </div>
    </div>
    <span class="book-loader-label">Loading&hellip;</span>
  </div>

  <!-- Logo sits on the left half; the opening page unfolds over it -->
  <div class="logo-backdrop">
    <img src="images/logo.jpg" alt="Logo" class="logo" />
  </div>

  <!-- Book centred in full viewport, spine at horizontal centre -->
  <div class="book-scene">
    <div id="book">
      <div class="page page-cover">
        <img src="images/cover.png" alt="Cover" />
      </div>

      <div class="page"><img src="images/page-01.png" alt="Page 1" /></div>
      <div class="page"><img src="images/page-02.png" alt="Page 2" /></div>
      <div class="page"><img src="images/page-03.png" alt="Page 3" /></div>
      <div class="page"><img src="images/page-04.png" alt="Page 4" /></div>
      <div class="page"><img src="images/page-05.png" alt="Page 5" /></div>
      <div class="page"><img src="images/page-06.png" alt="Page 6" /></div>
      <div class="page"><img src="images/page-07.png" alt="Page 7" /></div>
      <div class="page"><img src="images/page-08.png" alt="Page 8" /></div>
      <div class="page"><img src="images/page-09.png" alt="Page 9" /></div>
      <div class="page"><img src="images/page-10.png" alt="Page 10" /></div>
      <div class="page"><img src="images/page-11.png" alt="Page 11" /></div>
      <div class="page"><img src="images/page-12.png" alt="Page 12" /></div>
      <div class="page"><img src="images/page-13.png" alt="Page 13" /></div>
      <div class="page"><img src="images/page-14.png" alt="Page 14" /></div>
      <div class="page"><img src="images/page-15.png" alt="Page 15" /></div>
      <div class="page"><img src="images/page-16.png" alt="Page 16" /></div>
      <div class="page"><img src="images/page-17.png" alt="Page 17" /></div>
      <div class="page"><img src="images/page-18.png" alt="Page 18" /></div>
      <div class="page"><img src="images/page-19.png" alt="Page 19" /></div>
      <div class="page"><img src="images/page-20.png" alt="Page 20" /></div>
      <div class="page"><img src="images/page-21.png" alt="Page 21" /></div>
      <div class="page"><img src="images/page-22.png" alt="Page 22" /></div>
      <div class="page"><img src="images/page-23.png" alt="Page 23" /></div>
      <div class="page"><img src="images/page-24.png" alt="Page 24" /></div>
      <div class="page"><img src="images/page-25.png" alt="Page 25" /></div>
      <div class="page"><img src="images/page-26.png" alt="Page 26" /></div>
      <div class="page"><img src="images/page-27.png" alt="Page 27" /></div>
      <div class="page"><img src="images/page-28.png" alt="Page 28" /></div>
      <div class="page"><img src="images/page-29.png" alt="Page 29" /></div>
      <div class="page"><img src="images/page-30.png" alt="Page 30" /></div>
      <div class="page"><img src="images/page-31.png" alt="Page 31" /></div>
      <div class="page"><img src="images/page-32.png" alt="Page 32" /></div>
      <div class="page"><img src="images/page-33.png" alt="Page 33" /></div>
      <div class="page"><img src="images/page-34.png" alt="Page 34" /></div>
      <div class="page"><img src="images/page-35.png" alt="Page 35" /></div>
      <div class="page"><img src="images/page-36.png" alt="Page 36" /></div>
      <div class="page"><img src="images/page-37.png" alt="Page 37" /></div>
      <div class="page"><img src="images/page-38.png" alt="Page 38" /></div>
      <div class="page"><img src="images/page-39.png" alt="Page 39" /></div>
      <div class="page"><img src="images/page-40.png" alt="Page 40" /></div>
      <div class="page"><img src="images/page-41.png" alt="Page 41" /></div>
      <div class="page"><img src="images/page-42.png" alt="Page 42" /></div>
      <div class="page"><img src="images/page-43.png" alt="Page 43" /></div>
      <div class="page"><img src="images/page-44.png" alt="Page 44" /></div>
      <div class="page"><img src="images/page-45.png" alt="Page 45" /></div>
      <div class="page"><img src="images/page-46.png" alt="Page 46" /></div>
      <div class="page page-cover page-back">
        <img src="images/back-cover.png" alt="Back Cover" />
      </div>
    </div>

    <!-- Storyteller mode: blocks StPageFlip mouse events, then overlay + lens -->
    <div id="storytellerBlocker" class="storyteller-blocker"></div>
    <div class="storyteller-hint" aria-live="polite">Click anywhere to exit storyteller mode</div>
    <div id="storytellerOverlay" class="storyteller-overlay"></div>
    <div id="storytellerLens" class="storyteller-lens" aria-hidden="true">
      <img id="storytellerLensImg" class="storyteller-lens-img" alt="" />
    </div>

    <nav class="book-nav">
      <button id="closeBtn" class="nav-btn nav-btn--close" aria-label="Close book" title="Close book">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" aria-hidden="true">
          <path d="M2 7L8 2L14 7V14H10V10H6V14H2V7Z"/>
        </svg>
      </button>
      <button id="prevBtn" class="nav-btn" aria-label="Previous page">&#8592;</button>
      <button id="pageInfo" class="page-info-btn" aria-label="Jump to page" title="Jump to page">1 / 42</button>
      <button id="nextBtn" class="nav-btn" aria-label="Next page">&#8594;</button>

      <div id="jumpPanel" class="jump-panel" aria-hidden="true">
        <span class="jump-label">Jump to page</span>
        <div id="jumpDots" class="jump-dots"></div>
      </div>

      <button id="storytellerBtn" class="nav-btn storyteller-btn" aria-label="Toggle storyteller mode" title="Storyteller mode">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" aria-hidden="true">
          <path d="M1 8C1 8 3.5 3 8 3C12.5 3 15 8 15 8C15 8 12.5 13 8 13C3.5 13 1 8 1 8Z"/>
          <circle cx="8" cy="8" r="2.2"/>
        </svg>
      </button>
    </nav>
  </div>

  <script src="lib/page-flip.browser.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
